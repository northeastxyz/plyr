<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huya Full Proxy FLV Player</title>
    
    <script src="https://northeastxyz.github.io/plyr/mpegts.js" onerror="let s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/mpegts.js/1.7.3/mpegts.min.js';document.head.appendChild(s);"></script>
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0b0b0c;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            width: 100%;
            max-width: 480px;
            background: #18181b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #27272a;
            padding: 12px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls-panel {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-reload {
            background-color: #0d9488;
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reload:hover { background-color: #0f766e; }
        .status-badge {
            font-size: 12px;
            color: #a1a1aa;
            text-align: center;
            word-break: break-all;
            background: #27272a;
            padding: 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="video-wrapper">
            <video id="videoElement" controls crossorigin="anonymous" playsinline></video>
        </div>
        <div class="controls-panel">
            <button class="btn-reload" id="reloadBtn">Reload Stream Proxy</button>
            <div class="status-badge" id="streamUrlBadge">Menghubungkan...</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const videoElement = document.getElementById('videoElement');
            const reloadBtn = document.getElementById('reloadBtn');
            const streamUrlBadge = document.getElementById('streamUrlBadge');
            let player = null;

            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get('id') || '30805928';
            const finalProxyUrl = `https://flv.northeastxyz.workers.dev/?id=${roomId}`;

            streamUrlBadge.textContent = `Proxy: ${finalProxyUrl}`;

            function startLiveStream() {
                if (player !== null) {
                    player.unload();
                    player.detachMediaElement();
                    player.destroy();
                    player = null;
                }

                if (typeof mpegts !== 'undefined' && mpegts.getFeatureList().isSupported) {
                    player = mpegts.createPlayer({
                        type: 'flv',
                        isLive: true,
                        url: finalProxyUrl,
                        cors: true
                    }, {
                        enableWorker: true,
                        lazyLoad: false,
                        liveBufferLatencyChasing: true,
                        stashInitialSize: 32
                    });

                    player.attachMediaElement(videoElement);
                    player.load();
                    
                    videoElement.muted = true;
                    player.play().catch(err => console.log("Autoplay ditahan browser.", err));
                } else {
                    // Jika gagal memuat, tunggu 1 detik lalu coba lagi secara otomatis
                    setTimeout(startLiveStream, 1000);
                }
            }

            // Jalankan stream dengan sedikit jeda agar library siap
            setTimeout(startLiveStream, 500);
            reloadBtn.addEventListener('click', startLiveStream);
        });
    </script>

</body>
</html>
