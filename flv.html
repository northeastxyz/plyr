<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huya Full Proxy FLV Player</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mpegts.js/1.6.2/mpegts.min.js"></script>
    
    <style>
        * { 
            box-sizing: border-box; 
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0b0b0c;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            width: 100%;
            max-width: 480px; /* Dioptimalkan untuk layout vertikal/mobile */
            background: #18181b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #27272a;
            padding: 12px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls-panel {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-reload {
            background-color: #0d9488;
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reload:hover { 
            background-color: #0f766e; 
        }
        .status-badge {
            font-size: 12px;
            color: #a1a1aa;
            text-align: center;
            word-break: break-all;
            background: #27272a;
            padding: 6px;
            border-radius: 4px;
        }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="video-wrapper">
            <video id="videoElement" controls crossorigin="anonymous" playsinline></video>
        </div>
        <div class="controls-panel">
            <button class="btn-reload" id="reloadBtn">Reload Stream Proxy</button>
            <div class="status-badge" id="streamUrlBadge">Menghubungkan ke Proxy...</div>
            <div class="error-msg" id="errorMsg">Stream terputus atau offline. Silakan klik Reload.</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const videoElement = document.getElementById('videoElement');
            const reloadBtn = document.getElementById('reloadBtn');
            const streamUrlBadge = document.getElementById('streamUrlBadge');
            const errorMsg = document.getElementById('errorMsg');
            let player = null;

            // 1. Ambil ID room dari URL browser (contoh: flv.html?id=30805928)
            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get('id') || '30805928';

            // 2. Base URL Cloudflare Workers Full Proxy milikmu
            const workersBaseUrl = 'https://flv.northeastxyz.workers.dev/'; 
            const finalProxyUrl = `${workersBaseUrl}?id=${roomId}`;

            // Tampilkan info URL proxy yang sedang aktif
            streamUrlBadge.textContent = `Proxying: ${finalProxyUrl}`;

            function startLiveStream() {
                // Bersihkan instance player lama sebelum re-init (mencegah memory leak)
                if (player !== null) {
                    player.unload();
                    player.detachMediaElement();
                    player.destroy();
                    player = null;
                }

                errorMsg.style.display = 'none';

                if (typeof mpegts !== 'undefined' && mpegts.getFeatureList().isSupported) {
                    // Konfigurasi performa tinggi untuk jalur Full Proxy (Low Latency)
                    player = mpegts.createPlayer({
                        type: 'flv',
                        isLive: true,
                        url: finalProxyUrl,
                        cors: true
                    }, {
                        enableWorker: true,             // Encoding di thread terpisah agar UI lancar
                        lazyLoad: false,                // Matikan lazy load agar data terus ditarik konstan
                        liveBufferLatencyChasing: true, // Otomatis skip buffer jika player tertinggal dari server
                        stashInitialSize: 128           // Ukuran awal buffer dalam KB (bikin loading awal instan)
                    });

                    player.attachMediaElement(videoElement);
                    player.load();
                    
                    // Browser modern mewajibkan suara dimatikan (muted) untuk bisa autoplay
                    videoElement.muted = true;
                    
                    player.play().catch(err => {
                        console.log("Autoplay ditahan browser, klik play manual.", err);
                    });

                    // Tangkap error jika proxy putus di tengah jalan
                    player.on(mpegts.Events.ERROR, (type, detail, info) => {
                        console.error('Player Error:', type, detail, info);
                        errorMsg.style.display = 'block';
                    });

                } else {
                    alert('Gagal mendeteksi library mpegts.js atau browser tidak mendukung.');
                }
            }

            // Jalankan player otomatis saat halaman dibuka
            startLiveStream();

            // Handler untuk tombol reload proxy
            reloadBtn.addEventListener('click', startLiveStream);
        });
    </script>

</body>
</html>
