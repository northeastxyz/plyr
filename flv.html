<script>

const video =
    document.getElementById('video');

const statusBox =
    document.getElementById('status');

const loader =
    document.getElementById('loader');

const errorBox =
    document.getElementById('errorBox');

const qualitySelect =
    document.getElementById('quality');

const fullscreenBtn =
    document.getElementById('fullscreenBtn');

const reloadBtn =
    document.getElementById('reloadBtn');

const statsBox =
    document.getElementById('stats');

// =========================
// PLAYER STATE
// =========================

let player = null;

let reconnectTimer = null;

let watchdogTimer = null;

let reconnectCount = 0;

// =========================
// AUTO URL
// =========================

// RAW FLV URL
const rawStream = `https://gabriel-zum-consultancy-plasma.trycloudflare.com/https://flvhspull2mgsplive.miguvideo.com/mglive/mgss150_51.flv?msisdn=784f8113d8be6ac956e87e3eee4bba5e&mdspid=&spid=800033&netType=0&sid=7510484663&pid=2028597139&timestamp=20260521220610&Channel_ID=0116_2600034600-99000-201600010010028&ProgramID=964849605&ParentNodeID=-99&assertID=7510484663&client_ip=82.157.96.134&SecurityKey=20260521220610&promotionId=&mvid=7510241997&mcid=500020&mpid=120000577269&playurlVersion=ZQ-A1-9.5.1-RELEASE&userid=&jmhm=&videocodec=h264&appCode=miguvideo_android&bean=mgspad&tid=android&conFee=0&encrypt=cbed50b3e1e8e7e950882c6a01e0ca0d&sv=10004&ct=android`;

// AUTO ENCODE
const currentUrl =
    encodeURI(rawStream);

console.log(
    'ENCODED URL:',
    currentUrl
);

// =========================
// STATUS
// =========================

function setStatus(text){

    statusBox.textContent = text;
}

// =========================
// LOADER
// =========================

function showLoader(){

    loader.classList.remove('hidden');
}

function hideLoader(){

    loader.classList.add('hidden');
}

// =========================
// DESTROY PLAYER
// =========================

function destroyPlayer(){

    try{

        if(player){

            player.pause();

            player.unload();

            player.detachMediaElement();

            player.destroy();

            player = null;
        }

    }catch(err){

        console.warn(err);
    }
}

// =========================
// WATCHDOG
// =========================

function resetWatchdog(){

    clearTimeout(watchdogTimer);

    watchdogTimer =
        setTimeout(() => {

            console.warn(
                'Watchdog timeout'
            );

            reconnect();

        }, 15000);
}

// =========================
// RECONNECT
// =========================

function reconnect(){

    destroyPlayer();

    errorBox.style.display = 'block';

    const delay = Math.min(
        15000,
        1000 * (2 ** reconnectCount)
    );

    reconnectCount++;

    setStatus(
        `Reconnecting in ${delay/1000}s...`
    );

    clearTimeout(reconnectTimer);

    reconnectTimer =
        setTimeout(() => {

            startPlayer();

        }, delay);
}

// =========================
// START PLAYER
// =========================

function startPlayer(){

    destroyPlayer();

    showLoader();

    setStatus(
        'Connecting FLV...'
    );

    errorBox.style.display = 'none';

    console.log(
        'STREAM:',
        currentUrl
    );

    if(
        typeof mpegts === 'undefined'
    ){

        setStatus(
            'mpegts.js failed'
        );

        return;
    }

    if(
        !mpegts.getFeatureList()
            .mseLivePlayback
    ){

        setStatus(
            'Browser unsupported'
        );

        return;
    }

    player =
        mpegts.createPlayer({

            type:'flv',

            isLive:true,

            url:currentUrl

        },{

            enableWorker:true,

            lazyLoad:false,

            deferLoadAfterSourceOpen:false,

            liveBufferLatencyChasing:true,

            liveSync:true,

            autoCleanupSourceBuffer:true,

            autoCleanupMaxBackwardDuration:30,

            autoCleanupMinBackwardDuration:10,

            stashInitialSize:64,

            fixAudioTimestampGap:false
        });

    player.attachMediaElement(video);

    player.load();

    // AUTOPLAY
    video.muted = true;

    video.play()
        .then(() => {

            console.log(
                'Autoplay success'
            );

        })
        .catch(err => {

            console.warn(
                'Autoplay blocked',
                err
            );
        });

    // =========================
    // PLAYER ERROR
    // =========================

    player.on(
        mpegts.Events.ERROR,
        (type, detail) => {

            console.error(
                'FLV ERROR',
                type,
                detail
            );

            reconnect();
        }
    );

    // =========================
    // STATISTICS
    // =========================

    player.on(
        mpegts.Events.STATISTICS_INFO,
        (stats) => {

            statsBox.innerHTML = `
                Speed:
                ${stats.speed} KB/s
                |
                Loader:
                ${stats.loaderType}
            `;
        }
    );
}

// =========================
// VIDEO EVENTS
// =========================

video.addEventListener(
    'playing',
    () => {

        hideLoader();

        reconnectCount = 0;

        errorBox.style.display = 'none';

        setStatus('LIVE');

        resetWatchdog();
    }
);

video.addEventListener(
    'waiting',
    () => {

        showLoader();

        setStatus(
            'Buffering...'
        );
    }
);

video.addEventListener(
    'timeupdate',
    () => {

        resetWatchdog();
    }
);

video.addEventListener(
    'stalled',
    reconnect
);

video.addEventListener(
    'error',
    reconnect
);

// =========================
// RELOAD
// =========================

reloadBtn.addEventListener(
    'click',
    () => {

        reconnectCount = 0;

        startPlayer();
    }
);

// =========================
// QUALITY
// =========================

qualitySelect.addEventListener(
    'change',
    () => {

        reconnectCount = 0;

        startPlayer();
    }
);

// =========================
// FULLSCREEN
// =========================

fullscreenBtn.addEventListener(
    'click',
    () => {

        if(
            !document.fullscreenElement
        ){

            document
                .querySelector('.player')
                .requestFullscreen();

        }else{

            document.exitFullscreen();
        }
    }
);

// =========================
// ONLINE/OFFLINE
// =========================

window.addEventListener(
    'online',
    () => {

        reconnectCount = 0;

        startPlayer();
    }
);

window.addEventListener(
    'offline',
    () => {

        setStatus(
            'Network Offline'
        );
    }
);

// =========================
// TAB VISIBILITY
// =========================

document.addEventListener(
    'visibilitychange',
    () => {

        if(!document.hidden){

            reconnectCount = 0;

            startPlayer();
        }
    }
);

// =========================
// AUTO START
// =========================

startPlayer();

</script>
