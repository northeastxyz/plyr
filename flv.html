<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLV Player - Direct</title>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <video id="videoElement" controls autoplay muted></video>

    <script>
        if (flvjs.isSupported()) {
            const videoElement = document.getElementById('videoElement');
            const params = new URLSearchParams(window.location.search);
            const flvUrl = params.get('url');

            if (flvUrl) {
                const flvPlayer = flvjs.createPlayer({
                    type: 'flv', // Memaksa format FLV meski tanpa ekstensi
                    url: flvUrl,
                    isLive: true,
                    cors: true
                }, {
                    enableStashBuffer: false,
                    fixAudioTimestampGap: false
                });
                
                flvPlayer.attachMediaElement(videoElement);
                flvPlayer.load();
                flvPlayer.play().catch(e => console.log("Autoplay blocked"));

                flvPlayer.on(flvjs.Events.ERROR, (errType, errDetail) => {
                    console.error('FLV Error:', errType, errDetail);
                });
            }
        }
    </script>
</body>
</html>
