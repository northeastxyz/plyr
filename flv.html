<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Professional FLV Live Player</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{

    width:100%;
    height:100%;

    background:#050505;

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        sans-serif;

    overflow:hidden;
}

body{

    display:flex;

    justify-content:center;

    align-items:center;
}

.player{

    width:100%;
    height:100%;

    position:relative;

    background:black;
}

video{

    width:100%;
    height:100%;

    object-fit:contain;

    background:black;
}

/* =========================
TOPBAR
========================= */

.topbar{

    position:absolute;

    top:14px;
    left:14px;
    right:14px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    z-index:50;
}

.live{

    display:flex;

    align-items:center;

    gap:8px;

    background:rgba(0,0,0,.55);

    backdrop-filter:blur(10px);

    padding:10px 14px;

    border-radius:999px;

    color:white;

    font-size:13px;

    font-weight:700;
}

.dot{

    width:10px;
    height:10px;

    border-radius:50%;

    background:#ff2d55;

    animation:pulse 1s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(.8);
        opacity:.6;
    }

    50%{
        transform:scale(1.2);
        opacity:1;
    }

    100%{
        transform:scale(.8);
        opacity:.6;
    }
}

/* =========================
BOTTOM PANEL
========================= */

.controls{

    position:absolute;

    left:14px;
    right:14px;
    bottom:14px;

    z-index:50;
}

.panel{

    background:rgba(0,0,0,.55);

    backdrop-filter:blur(14px);

    border-radius:18px;

    padding:14px;

    color:white;
}

.status{

    font-size:13px;

    color:#b3b3b3;

    margin-bottom:12px;

    word-break:break-all;
}

.row{

    display:flex;

    gap:10px;
}

button,select{

    border:none;

    outline:none;

    background:#18181b;

    color:white;

    border-radius:12px;

    padding:12px;

    font-size:14px;
}

button{

    cursor:pointer;
}

button:hover{

    background:#232327;
}

select{

    width:120px;
}

.loader{

    position:absolute;

    inset:0;

    background:rgba(0,0,0,.45);

    backdrop-filter:blur(3px);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:40;
}

.spinner{

    width:60px;
    height:60px;

    border-radius:50%;

    border:4px solid rgba(255,255,255,.12);

    border-top-color:white;

    animation:spin .8s linear infinite;
}

@keyframes spin{

    to{
        transform:rotate(360deg);
    }
}

.hidden{
    display:none !important;
}

.error{

    color:#ff5b5b;

    margin-top:12px;

    font-size:13px;

    display:none;
}

.fullscreen{

    position:absolute;

    right:14px;
    bottom:140px;

    width:48px;
    height:48px;

    border:none;

    border-radius:14px;

    background:rgba(0,0,0,.55);

    backdrop-filter:blur(10px);

    color:white;

    z-index:60;

    cursor:pointer;
}

.stats{

    margin-top:10px;

    font-size:12px;

    color:#888;
}

.empty{

    position:absolute;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    color:white;

    z-index:30;

    text-align:center;

    padding:20px;
}

.empty h1{

    font-size:22px;

    margin-bottom:10px;
}

.empty p{

    font-size:14px;

    color:#999;

    line-height:1.6;

    word-break:break-all;
}

@media(max-width:700px){

    .controls{

        left:10px;
        right:10px;
        bottom:10px;
    }

    .topbar{

        left:10px;
        right:10px;
        top:10px;
    }
}

</style>

</head>

<body>

<div class="player">

    <video
        id="video"
        controls
        autoplay
        muted
        playsinline
        webkit-playsinline
        x5-playsinline>
    </video>

    <!-- EMPTY -->
    <div
        class="empty"
        id="emptyBox">

        <h1>
            No Stream URL
        </h1>

        <p>
            Example:
            <br><br>

            flv.html?url=https://example.com/live.flv?token=abc&sid=123
        </p>

    </div>

    <!-- LOADER -->
    <div
        class="loader hidden"
        id="loader">

        <div class="spinner"></div>

    </div>

    <!-- TOPBAR -->
    <div class="topbar">

        <div class="live">

            <div class="dot"></div>

            LIVE

        </div>

        <select id="quality">

            <option value="1080">
                1080p
            </option>

            <option
                value="720"
                selected>

                720p

            </option>

            <option value="480">
                480p
            </option>

            <option value="360">
                360p
            </option>

        </select>

    </div>

    <!-- FULLSCREEN -->
    <button
        class="fullscreen"
        id="fullscreenBtn">

        ⛶

    </button>

    <!-- CONTROLS -->
    <div class="controls">

        <div class="panel">

            <div
                class="status"
                id="status">

                Waiting stream...

            </div>

            <div class="row">

                <button id="reloadBtn">
                    Reload Stream
                </button>

            </div>

            <div
                class="error"
                id="errorBox">

                Stream disconnected.
                Reconnecting...

            </div>

            <div
                class="stats"
                id="stats">

                Waiting stream...

            </div>

        </div>

    </div>

</div>

<script>

// =========================
// ELEMENT
// =========================

const video =
    document.getElementById('video');

const statusBox =
    document.getElementById('status');

const loader =
    document.getElementById('loader');

const errorBox =
    document.getElementById('errorBox');

const qualitySelect =
    document.getElementById('quality');

const fullscreenBtn =
    document.getElementById('fullscreenBtn');

const reloadBtn =
    document.getElementById('reloadBtn');

const statsBox =
    document.getElementById('stats');

const emptyBox =
    document.getElementById('emptyBox');

// =========================
// PLAYER STATE
// =========================

let player = null;

let reconnectTimer = null;

let watchdogTimer = null;

let reconnectCount = 0;

// =========================
// GET FULL URL PARAM
// =========================

function getRawUrl(){

    const href =
        window.location.href;

    const index =
        href.indexOf('?url=');

    if(index === -1){

        return null;
    }

    return href.substring(
        index + 5
    );
}

const rawUrl =
    getRawUrl();

let currentUrl = null;

// =========================
// VALIDATE URL
// =========================

if(
    rawUrl &&
    rawUrl.trim() !== ''
){

    currentUrl =
        decodeURIComponent(rawUrl);

    console.log(
        'FULL STREAM URL:',
        currentUrl
    );

}else{

    currentUrl = null;

    console.warn(
        'No stream URL'
    );
}

// =========================
// STATUS
// =========================

function setStatus(text){

    statusBox.textContent = text;
}

// =========================
// LOADER
// =========================

function showLoader(){

    loader.classList.remove('hidden');
}

function hideLoader(){

    loader.classList.add('hidden');
}

// =========================
// DESTROY PLAYER
// =========================

function destroyPlayer(){

    try{

        if(player){

            player.pause();

            player.unload();

            player.detachMediaElement();

            player.destroy();

            player = null;
        }

    }catch(err){

        console.warn(err);
    }
}

// =========================
// WATCHDOG
// =========================

function resetWatchdog(){

    clearTimeout(
        watchdogTimer
    );

    watchdogTimer =
        setTimeout(() => {

            console.warn(
                'Watchdog timeout'
            );

            reconnect();

        }, 15000);
}

// =========================
// RECONNECT
// =========================

function reconnect(){

    if(!currentUrl){

        return;
    }

    destroyPlayer();

    errorBox.style.display =
        'block';

    const delay = Math.min(
        15000,
        1000 * (
            2 ** reconnectCount
        )
    );

    reconnectCount++;

    setStatus(
        `Reconnecting in ${delay/1000}s...`
    );

    clearTimeout(
        reconnectTimer
    );

    reconnectTimer =
        setTimeout(() => {

            startPlayer();

        }, delay);
}

// =========================
// START PLAYER
// =========================

function startPlayer(){

    // =========================
    // EMPTY URL
    // =========================

    if(!currentUrl){

        destroyPlayer();

        hideLoader();

        emptyBox.style.display =
            'flex';

        setStatus(
            'No stream URL'
        );

        statsBox.innerHTML =
            'Waiting stream...';

        errorBox.style.display =
            'none';

        return;
    }

    // =========================
    // HAS URL
    // =========================

    emptyBox.style.display =
        'none';

    destroyPlayer();

    showLoader();

    setStatus(
        'Connecting FLV...'
    );

    errorBox.style.display =
        'none';

    console.log(
        'STREAM:',
        currentUrl
    );

    // =========================
    // CHECK MPEGTS
    // =========================

    if(
        typeof mpegts ===
        'undefined'
    ){

        setStatus(
            'mpegts.js failed'
        );

        return;
    }

    // =========================
    // CHECK BROWSER
    // =========================

    if(
        !mpegts
            .getFeatureList()
            .mseLivePlayback
    ){

        setStatus(
            'Browser unsupported'
        );

        return;
    }

    // =========================
    // CREATE PLAYER
    // =========================

    player =
        mpegts.createPlayer({

            type:'flv',

            isLive:true,

            url:currentUrl

        },{

            enableWorker:true,

            lazyLoad:false,

            deferLoadAfterSourceOpen:false,

            liveBufferLatencyChasing:true,

            liveSync:true,

            autoCleanupSourceBuffer:true,

            autoCleanupMaxBackwardDuration:30,

            autoCleanupMinBackwardDuration:10,

            stashInitialSize:64,

            fixAudioTimestampGap:false
        });

    player.attachMediaElement(
        video
    );

    player.load();

    // =========================
    // AUTOPLAY
    // =========================

    video.muted = true;

    video.play()
        .then(() => {

            console.log(
                'Autoplay success'
            );

        })
        .catch(err => {

            console.warn(
                'Autoplay blocked',
                err
            );
        });

    // =========================
    // PLAYER ERROR
    // =========================

    player.on(
        mpegts.Events.ERROR,
        (type, detail) => {

            console.error(
                'FLV ERROR',
                type,
                detail
            );

            reconnect();
        }
    );

    // =========================
    // STATISTICS
    // =========================

    player.on(
        mpegts.Events
            .STATISTICS_INFO,

        (stats) => {

            statsBox.innerHTML = `
                Speed:
                ${stats.speed} KB/s
                |
                Loader:
                ${stats.loaderType}
            `;
        }
    );
}

// =========================
// VIDEO EVENTS
// =========================

video.addEventListener(
    'playing',
    () => {

        hideLoader();

        reconnectCount = 0;

        errorBox.style.display =
            'none';

        setStatus(
            'LIVE'
        );

        resetWatchdog();
    }
);

video.addEventListener(
    'waiting',
    () => {

        showLoader();

        setStatus(
            'Buffering...'
        );
    }
);

video.addEventListener(
    'timeupdate',
    () => {

        resetWatchdog();
    }
);

video.addEventListener(
    'stalled',
    reconnect
);

video.addEventListener(
    'error',
    reconnect
);

// =========================
// RELOAD
// =========================

reloadBtn.addEventListener(
    'click',
    () => {

        reconnectCount = 0;

        startPlayer();
    }
);

// =========================
// QUALITY
// =========================

qualitySelect.addEventListener(
    'change',
    () => {

        reconnectCount = 0;

        startPlayer();
    }
);

// =========================
// FULLSCREEN
// =========================

fullscreenBtn.addEventListener(
    'click',
    () => {

        if(
            !document
                .fullscreenElement
        ){

            document
                .querySelector(
                    '.player'
                )
                .requestFullscreen();

        }else{

            document
                .exitFullscreen();
        }
    }
);

// =========================
// ONLINE/OFFLINE
// =========================

window.addEventListener(
    'online',
    () => {

        reconnectCount = 0;

        startPlayer();
    }
);

window.addEventListener(
    'offline',
    () => {

        setStatus(
            'Network Offline'
        );
    }
);

// =========================
// TAB VISIBILITY
// =========================

document.addEventListener(
    'visibilitychange',
    () => {

        if(
            !document.hidden &&
            currentUrl
        ){

            reconnectCount = 0;

            startPlayer();
        }
    }
);

// =========================
// AUTO START
// =========================

startPlayer();

</script>

</body>
</html>
