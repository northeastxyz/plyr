<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern FLV Player</title>
    
    <script src="https://unpkg.com/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0c0c0d;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            width: 100%;
            max-width: 450px; /* Dioptimalkan untuk tampilan mobile/vertikal sesuai screenshot */
            background: #18181b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid #27272a;
            padding: 10px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9; /* Menjaga rasio player tetap rapi */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls-panel {
            margin-top: 12px;
            display: flex;
            justify-content: center;
        }
        .btn-reload {
            background-color: #0d9488;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .btn-reload:hover {
            background-color: #0f766e;
        }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="video-wrapper">
            <video id="videoElement" controls crossorigin="anonymous" playsinline></video>
        </div>
        <div class="controls-panel">
            <button class="btn-reload" id="reloadBtn">Reload Stream</button>
        </div>
        <div class="error-msg" id="errorMsg">Gagal memuat stream. Pastikan URL benar dan CORS aktif di server tujuan.</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const videoElement = document.getElementById('videoElement');
            const errorMsg = document.getElementById('errorMsg');
            const reloadBtn = document.getElementById('reloadBtn');
            let player = null;

            // 1. Mengambil URL stream FLV dari query parameter browser (?url=...)
            const urlParams = new URLSearchParams(window.location.search);
            let flvUrl = urlParams.get('url');

            // URL Cadangan jika parameter query kosong (silakan ganti untuk keperluan testing lokal)
            if (!flvUrl) {
                flvUrl = 'https://flv.northeastxyz.workers.dev/?id=30805298'; 
            }

            function initPlayer() {
                // Hancurkan instance player lama jika ada sebelum membuat yang baru
                if (player !== null) {
                    player.unload();
                    player.detachMediaElement();
                    player.destroy();
                    player = null;
                }

                if (mpegts.getFeatureList().isSupported) {
                    player = mpegts.createPlayer({
                        type: 'flv',
                        isLive: true,  // Set ke false jika memutar file rekaman statis
                        url: flvUrl,
                        cors: true     // Mengaktifkan penanganan CORS internal mpegts
                    }, {
                        enableWorker: true, // Menggunakan web worker agar performa decoding lebih lancar
                        lazyLoadMaxDuration: 3 * 60,
                        seekType: 'range'
                    });

                    player.attachMediaElement(videoElement);
                    player.load();
                    
                    // Catatan: Browser modern mewajibkan suara di-mute jika ingin otomatis putar
                    videoElement.muted = true; 
                    
                    player.play().catch(error => {
                        console.log("Autoplay diblokir browser, pengguna harus menekan tombol play.", error);
                    });

                    // Menangani error internal pada stream
                    player.on(mpegts.Events.ERROR, (type, detail, info) => {
                        console.error('Player Error:', type, detail, info);
                        errorMsg.style.display = 'block';
                    });
                    
                    errorMsg.style.display = 'none';
                } else {
                    alert('Browser Anda tidak mendukung dekoder mpegts.js');
                }
            }

            // Jalankan inisialisasi pertama kali
            initPlayer();

            // Tombol reload untuk memuat ulang stream jika terputus
            reloadBtn.addEventListener('click', () => {
                errorMsg.style.display = 'none';
                initPlayer();
            });
        });
    </script>

</body>
</html>
