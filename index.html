<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic MPD ClearKey Player</title>

    <!-- Shaka Player UI Styles (Tampilan Player) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/controls.css">
    
    <style>
        /* Desain Minimalis agar Player memenuhi layar */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .video-container {
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 675px; /* Rasio 16:9 */
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
        }

        /* Pesan Error jika link salah */
        #error-message {
            position: absolute;
            color: white;
            background: rgba(255, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="error-message">Terjadi kesalahan saat memuat video.</div>

    <!-- Kontainer Player -->
    <div class="video-container" data-shaka-player-container>
        <video 
            data-shaka-player 
            id="video" 
            poster="https://placehold.co/1920x1080/000000/FFFFFF?text=Loading+Video..." 
            autoplay>
        </video>
    </div>

    <!-- Library Shaka Player -->
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/shaka-player.ui.js"></script>
    
    <!-- Memanggil file logika JavaScript kita -->
    <script src="script.js"></script>

</body>
</html>
