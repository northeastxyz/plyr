<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plyr MPD - Mobile Optimized</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Memastikan player tidak terpotong tombol navigasi HP */
        .plyr {
            width: 100%;
            max-height: 100%;
        }
        /* Custom warna kontrol jika ingin (opsional) */
        :root { --plyr-color-main: #00b3ff; }
    </style>
</head>
<body>

    <div class="container">
        <video id="player" playsinline controls></video>
    </div>

    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('player');
            const params = new URLSearchParams(window.location.search);
            const mpdUrl = params.get('mpd');
            const keyPair = params.get('key');

            if (!mpdUrl) return;

            // 1. Inisialisasi Dash.js
            const dashPlayer = dashjs.MediaPlayer().create();
            
            // Konfigurasi DRM ClearKey jika ada
            if (keyPair && keyPair.includes(':')) {
                const [kid, key] = keyPair.split(':');
                dashPlayer.setProtectionData({
                    "org.w3.clearkey": {
                        "clearkeys": { [kid]: key }
                    }
                });
            }

            dashPlayer.initialize(video, mpdUrl, true);

            // 2. Inisialisasi Plyr
            const player = new Plyr(video, {
                controls: [
                    'play-large', 'play', 'progress', 'current-time', 
                    'mute', 'volume', 'settings', 'fullscreen'
                ],
                settings: ['quality', 'speed'],
                tooltips: { controls: false, seek: true }
            });

            // 3. Menghubungkan Kualitas Dash ke Menu Plyr
            dashPlayer.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, function () {
                const availableQualities = dashPlayer.getBitrateInfoListFor("video").map(m => m.height);
                
                player.config.quality = {
                    default: availableQualities[0],
                    options: availableQualities,
                    forced: true,
                    onChange: (newQuality) => {
                        dashPlayer.getBitrateInfoListFor("video").forEach((m) => {
                            if (m.height === newQuality) {
                                dashPlayer.setQualityFor("video", m.bitrateIndex);
                            }
                        });
                    }
                };
            });

            // Handle klik layar untuk show/hide controls yang lebih responsif
            video.addEventListener('touchstart', () => {
                if (player.showing) player.toggleControls(true);
            });
        });
    </script>
</body>
</html>
