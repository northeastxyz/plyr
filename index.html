<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal DRM Player</title>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* Video Player Area */
        .player-container { width: 100%; max-width: 800px; background: #000; aspect-ratio: 16/9; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        video { width: 100%; height: 100%; }

        /* Input Area */
        .input-card { background: #161b22; width: 90%; max-width: 760px; margin: 20px 0; padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #fff; box-sizing: border-box; }
        .btn-play { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-play:hover { background: #2ea043; }

        /* Channel List Area */
        #channel-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            width: 90%;
            max-width: 800px;
            padding-bottom: 50px;
        }
        .channel { cursor: pointer; text-align: center; }
        .channel img {
            width: 100%; aspect-ratio: 1/1; object-fit: contain;
            background: #fff; border-radius: 10px; padding: 5px;
            border: 2px solid transparent; transition: 0.2s;
        }
        .channel:hover img { transform: translateY(-5px); border-color: #58a6ff; }
        .channel-name { font-size: 11px; margin-top: 5px; color: #8b949e; }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="videoPlayer" controls playsinline></video>
    </div>

    <div class="input-card">
        <div class="input-group">
            <label>Stream URL (MPD)</label>
            <input type="text" id="urlInput" placeholder="Masukkan link .mpd di sini...">
        </div>
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Key ID (KID)</label>
                <input type="text" id="kidInput" placeholder="Hex KID">
            </div>
            <div style="flex: 1;">
                <label>Key</label>
                <input type="text" id="keyInput" placeholder="Hex Key">
            </div>
        </div>
        <button class="btn-play" onclick="startManual()">▶ PUTAR SEKARANG</button>
    </div>

    <div id="channel-list">
        </div>

    <script>
        const player = dashjs.MediaPlayer().create();
        const videoElement = document.getElementById('videoPlayer');

        // Fungsi Putar Manual
        function startManual() {
            const url = document.getElementById('urlInput').value.trim();
            const kid = document.getElementById('kidInput').value.trim();
            const key = document.getElementById('keyInput').value.trim();

            if (!url) {
                alert("Masukkan link MPD terlebih dahulu!");
                return;
            }

            if (kid && key) {
                player.setProtectionData({
                    "org.w3.clearkey": {
                        "clearkeys": { [kid]: key }
                    }
                });
            }

            player.initialize(videoElement, url, true);
        }

        // Contoh Data Channel (Hanya untuk isi daftar di bawah)
        const savedChannels = [
            { name: "CH 5", logo: "https://ais-s.ais-vidnt.com/ais/play/origin/LIVE/channelicon/ch5new.logo.png", url: "", kid: "", key: "" },
            { name: "CH 2", logo: "https://ais-s.ais-vidnt.com/ais/play/origin/LIVE//channelicon/0001.png", url: "", kid: "", key: "" }
        ];

        // Render Shortcut Channel
        const listContainer = document.getElementById("channel-list");
        savedChannels.forEach(ch => {
            const div = document.createElement("div");
            div.className = "channel";
            div.innerHTML = `<img src="${ch.logo}"><div class="channel-name">${ch.name}</div>`;
            div.onclick = () => {
                document.getElementById('urlInput').value = ch.url;
                document.getElementById('kidInput').value = ch.kid;
                document.getElementById('keyInput').value = ch.key;
                if(ch.url) startManual();
            };
            listContainer.appendChild(div);
        });
    </script>
</body>
</html>
