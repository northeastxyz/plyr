<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed MPD Mobile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/controls.css">
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
        }
        
        .video-container { 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        /* PERBAIKAN UTAMA: Menaikkan posisi control bar */
        .shaka-controls-container {
            bottom: 40px !important; /* Naikkan 40px supaya tidak tertutup tombol navigasi HP */
            display: flex;
        }

        .shaka-bottom-controls {
            padding: 0 10px 10px 10px !important;
        }

        /* Memperkecil ikon supaya muat di layar HP */
        .shaka-controls-button {
            padding: 2px !important;
        }
        
        .shaka-overflow-menu {
            background: rgba(20, 20, 20, 0.95) !important;
            bottom: 80px !important; /* Menu gear muncul lebih ke atas */
        }
    </style>
</head>
<body>

    <div class="video-container" data-shaka-player-container>
        <video data-shaka-player id="video" autoplay playsinline></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/shaka-player.ui.js"></script>

    <script>
        async function init() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            const controls = ui.getControls();
            const player = controls.getPlayer();

            ui.configure({
                'controlPanelElements': ['play_pause', 'spacer', 'quality', 'mute', 'fullscreen', 'overflow_menu'],
                'addQualityControls': true,
                'fadeDelay': 5000 
            });

            player.configure({
                abr: { enabled: true },
                streaming: { jumpLargeGaps: true }
            });

            const params = new URLSearchParams(window.location.search);
            const mpdUrl = params.get('mpd');
            const keyPair = params.get('key');

            if (keyPair && keyPair.includes(':')) {
                const [kid, key] = keyPair.split(':');
                player.configure({
                    drm: { clearKeys: { [kid]: key } }
                });
            }

            if (mpdUrl) {
                try {
                    await player.load(mpdUrl);
                } catch (e) {
                    console.error('Error load:', e);
                }
            }
        }

        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
