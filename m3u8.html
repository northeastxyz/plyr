<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal HLS Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

#video{
    width:100vw;
    height:100vh;
    background:#000;
    object-fit:contain;
}

#loading{
    position:absolute;
    color:white;
    font-family:sans-serif;
    font-size:14px;
    color:white;
    z-index:999;
}

#error{
    position:absolute;
    bottom:10px;
    left:10px;
    right:10px;
    color:red;
    font-size:12px;
    font-family:sans-serif;
    z-index:999;
    word-break:break-word;
}

</style>

</head>

<body>

<div id="loading">Loading stream...</div>

<div id="error"></div>

<video
    id="video"
    controls
    autoplay
    muted
    playsinline
></video>

<script>

const video = document.getElementById('video');

const loading = document.getElementById('loading');

const errorBox = document.getElementById('error');

function showError(msg){

    console.error(msg);

    errorBox.innerText = msg;
}

async function init() {

    const params = new URLSearchParams(window.location.search);

    const hlsUrl =
        params.get('m3u8') ||
        params.get('url');

    if (!hlsUrl) {

        showError('Missing ?m3u8=');

        return;
    }

    console.log('URL:', hlsUrl);

    // =====================================
    // Native HLS
    // =====================================

    // Banyak stream CCTV lebih cocok native

    if (video.canPlayType('application/vnd.apple.mpegurl')) {

        console.log('Using native HLS');

        video.src = hlsUrl;

        video.addEventListener('loadedmetadata', async () => {

            loading.style.display = 'none';

            try {

                await video.play();

            } catch(e) {

                console.error(e);

            }
        });

        video.addEventListener('error', () => {

            console.log('Native failed, fallback HLS.js');

            startHlsJs(hlsUrl);

        });

        return;
    }

    // =====================================
    // HLS.js fallback
    // =====================================

    startHlsJs(hlsUrl);
}

function startHlsJs(hlsUrl){

    if (!Hls.isSupported()) {

        showError('HLS not supported');

        return;
    }

    const hls = new Hls({

        enableWorker: true,

        lowLatencyMode: false,

        backBufferLength: 30

    });

    hls.loadSource(hlsUrl);

    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, async function() {

        console.log('Manifest loaded');

        loading.style.display = 'none';

        try {

            await video.play();

        } catch(e) {

            console.error(e);

        }

    });

    hls.on(Hls.Events.ERROR, function(event, data) {

        console.error(data);

        showError(
            'HLS Error: ' +
            data.type +
            ' | ' +
            data.details
        );

        if (data.fatal) {

            switch(data.type) {

                case Hls.ErrorTypes.NETWORK_ERROR:

                    console.log('Recover network');

                    hls.startLoad();

                    break;

                case Hls.ErrorTypes.MEDIA_ERROR:

                    console.log('Recover media');

                    hls.recoverMediaError();

                    break;

                default:

                    hls.destroy();

                    break;
            }
        }
    });

    video.addEventListener('playing', () => {

        loading.style.display = 'none';

    });

    video.addEventListener('waiting', () => {

        loading.style.display = 'block';

    });
}

document.addEventListener('DOMContentLoaded', init);

</script>

</body>
</html>
